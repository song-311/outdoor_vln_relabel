dataset:
  name: demo_indexed_real_pilot
  root: outputs/demo_manifest_indexed
  scene_id: demo_real_pilot
  sequence_id: demo_indexed_seq
  output_dir: outputs/demo_real_pilot_manifest

paths:
  image_dir: frames
  mask_dir: masks
  pose_file: trajectory.csv
  image_ext: ".jpg"
  mask_ext: ".png"

pose_file:
  format: csv
  delimiter: ","
  columns:
    frame_id: "frame_id"
    timestamp: "timestamp"
    x: "x"
    y: "y"
    yaw: "yaw"
    rgb_path: null
    semantic_path: null

matching:
  image_mode: by_frame_id
  image_pattern: "{frame_id:06d}.jpg"
  mask_mode: by_frame_id
  mask_pattern: "{frame_id:06d}.png"

defaults:
  terrain: dirt_trail
  yaw_unit: rad
  timestamp_unit: sec

semantic:
  label_map: outdoor_vln_relabel/configs/semantic_label_maps/generic_outdoor.yaml

pilot:
  max_frames: 1000
  min_segment_distance: 3.0
  max_segment_distance: 12.0
  min_duration: 4.0
  max_duration: 15.0
