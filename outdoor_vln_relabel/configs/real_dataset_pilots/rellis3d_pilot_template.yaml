dataset:
  name: rellis3d_pilot
  root: ""
  scene_id: rellis_scene_000
  sequence_id: seq_000
  output_dir: outputs/rellis_pilot_manifest

paths:
  image_dir: ""
  mask_dir: ""
  pose_file: ""
  image_ext: ".jpg"
  mask_ext: ".png"

pose_file:
  format: csv
  delimiter: ","
  columns:
    frame_id: "frame_id"
    timestamp: "timestamp"
    x: "x"
    y: "y"
    yaw: "yaw"
    rgb_path: null
    semantic_path: null

matching:
  image_mode: by_frame_id
  image_pattern: "{frame_id:06d}.jpg"
  mask_mode: by_frame_id
  mask_pattern: "{frame_id:06d}.png"

defaults:
  terrain: dirt_trail
  yaw_unit: rad
  timestamp_unit: sec

semantic:
  label_map: outdoor_vln_relabel/configs/semantic_label_maps/rellis3d_template.yaml

pilot:
  max_frames: 1000
  min_segment_distance: 3.0
  max_segment_distance: 12.0
  min_duration: 4.0
  max_duration: 15.0
