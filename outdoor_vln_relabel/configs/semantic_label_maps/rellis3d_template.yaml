name: rellis3d_template
mask_type: indexed

# Template only. Update label ids/names to match the exported RELLIS-3D masks
# used in your local preprocessing pipeline.
labels:
  0:
    name: background
    outdoor_group: unknown
    role: ignore
  1:
    name: dirt road
    outdoor_group: dirt_trail
    role: follow
  2:
    name: grass
    outdoor_group: grass
    role: follow
  3:
    name: tree
    outdoor_group: vegetation
    role: avoid
  4:
    name: bush
    outdoor_group: vegetation
    role: avoid
  5:
    name: mud
    outdoor_group: mud_water
    role: avoid
  6:
    name: puddle
    outdoor_group: mud_water
    role: avoid
  7:
    name: rock
    outdoor_group: rough_terrain
    role: avoid
  8:
    name: gravel
    outdoor_group: rough_terrain
    role: cautious_follow

terrain_groups:
  dirt_trail:
    followable: true
    avoidable: false
  grass:
    followable: true
    avoidable: false
  vegetation:
    followable: false
    avoidable: true
  mud_water:
    followable: false
    avoidable: true
  rough_terrain:
    followable: true
    avoidable: true
