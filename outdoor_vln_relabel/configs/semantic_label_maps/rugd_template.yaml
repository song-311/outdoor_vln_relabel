name: rugd_template
mask_type: color

# Template only. Replace color values with the exact RGB palette used by your
# RUGD masks after conversion/export.
labels:
  0:
    name: background
    color: [0, 0, 0]
    outdoor_group: unknown
    role: ignore
  1:
    name: dirt path
    color: [108, 64, 20]
    outdoor_group: dirt_trail
    role: follow
  2:
    name: grass
    color: [0, 102, 0]
    outdoor_group: grass
    role: follow
  3:
    name: bush
    color: [0, 255, 0]
    outdoor_group: vegetation
    role: avoid
  4:
    name: water
    color: [0, 0, 255]
    outdoor_group: mud_water
    role: avoid
  5:
    name: rock
    color: [128, 128, 128]
    outdoor_group: rough_terrain
    role: avoid

terrain_groups:
  dirt_trail:
    followable: true
    avoidable: false
  grass:
    followable: true
    avoidable: false
  vegetation:
    followable: false
    avoidable: true
  mud_water:
    followable: false
    avoidable: true
  rough_terrain:
    followable: true
    avoidable: true
