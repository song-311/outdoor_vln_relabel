# Template for adapting a BotanicGarden-style outdoor robot dataset.
# Edit dataset.root, paths.image_dir, paths.pose_file, and pose_file.columns
# to match the actual downloaded file structure before running conversion.
dataset:
  name: botanicgarden
  root: ""
  scene_id: botanicgarden_scene_001
  sequence_id: botanicgarden_seq_001

paths:
  image_dir: "images"
  mask_dir: "masks"
  pose_file: "poses.csv"
  output_dir: "outputs/botanicgarden_manifest"
  copy_files: false

pose_file:
  format: csv
  delimiter: ","
  columns:
    frame_id: "frame_id"
    timestamp: "timestamp"
    x: "x"
    y: "y"
    yaw: "yaw"
    rgb_path: "rgb_path"
    semantic_path: "semantic_path"
    terrain: "terrain"
    landmarks: null

image_matching:
  mode: from_pose_file
  frame_pattern: "{frame_id:06d}.jpg"

semantic_matching:
  mode: from_pose_file
  frame_pattern: "{frame_id:06d}.png"

defaults:
  terrain: dirt_trail
  yaw_unit: rad
  timestamp_unit: sec

